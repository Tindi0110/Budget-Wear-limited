services:
  # Backend Service (Django)
  - type: web
    name: budget-wear-limited-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn budgetwear.wsgi --bind 0.0.0.0:5000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: PORT
        value: 5000
      - key: DEBUG
        value: False

  # Frontend Service
  - type: web
    name: budget-wear-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NEXT_PUBLIC_API_URL
        value: https://budget-wear-limited-backend1.onrender.com/api
